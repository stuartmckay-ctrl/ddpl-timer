<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DDPL Shot Clock</title>
    <style>
        :root {
            --ddpl-red: #e63946;
            --ddpl-yellow: #ffbe0b;
            --ddpl-dark: #121212;
            --ddpl-grey: #2d2d2d;
            --ddpl-green: #2ecc71;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--ddpl-dark); 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
            user-select: none;
        }

        /* Start Overlay */
        #overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #overlay button { padding: 25px 50px; font-size: 1.8rem; background: var(--ddpl-yellow); border: none; border-radius: 15px; cursor: pointer; font-weight: bold; }

        header { 
            padding: 10px; background: #000; border-bottom: 3px solid var(--ddpl-yellow);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { height: 50px; }
        
        .timer-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .timer-display { font-size: 13rem; font-weight: 800; line-height: 1; }
        .warning { color: var(--ddpl-red); animation: blink 0.5s infinite; }

        .teams-container { display: flex; height: 35vh; border-top: 2px solid #444; }
        .team-btn { 
            flex: 1; padding: 20px; border: none; color: white; cursor: pointer;
            display: flex; flex-direction: column; justify-content: space-between;
            background: var(--ddpl-grey); outline: none;
        }
        .active-team { background: #0f301a !important; box-shadow: inset 0 0 40px #00ff0044; }
        .active-team h2 { color: #00ff00; }
