<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DDPL Shot Clock</title>
    <style>
        :root {
            --ddpl-red: #e63946;
            --ddpl-yellow: #ffbe0b;
            --ddpl-dark: #121212;
            --ddpl-grey: #2d2d2d;
            --ddpl-green: #2ecc71;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--ddpl-dark); 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
            user-select: none;
        }

        /* Interaction Overlay (Fixes Browser Block) */
        #overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #overlay button { padding: 20px 40px; font-size: 1.5rem; background: var(--ddpl-yellow); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        header { 
            padding: 10px; background: #000; border-bottom: 3px solid var(--ddpl-yellow);
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { height: 50px; }
        
        .timer-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .timer-display { font-size: 12rem; font-weight: 800; }
        .warning { color: var(--ddpl-red); animation: blink 0.5s infinite; }

        .teams-container { display: flex; height: 35vh; border-top: 2px solid #444; }
        .team-btn { 
            flex: 1; padding: 20px; border: none; color: white; cursor: pointer;
            display: flex; flex-direction: column; justify-content: space-between;
            background: var(--ddpl-grey); outline: none;
        }
        .active-team { background: #0f301a !important; box-shadow: inset 0 0 30px #00ff0033; }
        
        #pause-btn { background: #333; color: white; padding: 10px 30px; border-radius: 20px; border: 1px solid #555; margin-bottom: 20px; font-weight: bold; }
        .btn-extension { background: var(--ddpl-yellow); border: none; padding: 10px; font-weight: bold; border-radius: 5px; }
        
        .sponsor-box { background: white; color: black; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-top: 4px solid var(--ddpl-red); }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="overlay">
        <img src="ddpl_logo_original.png" style="height: 150px; margin-bottom: 20px;">
        <button onclick="initApp()">START TIMER APP</button>
        <p style="margin-top: 20px; color: #888;">Tap to enable audio & controls</p>
    </div>

    <header>
        <img src="ddpl_logo_original.png" class="logo">
        <h1 style="font-size: 0.9rem; color: var(--ddpl-yellow);">DUNFERMLINE POOL LEAGUE</h1>
        <button onclick="location.reload()" style="background:var(--ddpl-red); color:white; border:none; padding:5px 10px; border-radius:4px;">RESET</button>
    </header>

    <div class="timer-container">
        <div id="display" class="timer-display">60</div>
        <button id="pause-btn" onclick="togglePause()">PAUSE</button>
    </div>

    <div class="teams-container">
        <button id="team1-btn" class="team-btn" onclick="startTeam(1)">
            <div><h2>TEAM 1</h2><div id="t1-stat">Extension: Ready</div></div>
            <button class="btn-extension" onclick="useExt(1, event)">+30s EXT</button>
        </button>
        <button id="team2-btn" class="team-btn" onclick="startTeam(2)">
            <div><h2>TEAM 2</h2><div id="t2-stat">Extension: Ready</div></div>
            <button class="btn-extension" onclick="useExt(2, event)">+30s EXT</button>
        </button>
    </div>

    <div class="sponsor-box">SPONSORED BY: [YOUR SPONSOR]</div>

    <audio id="tick" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
    <audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/alarm_clock_short_beeps.ogg"></audio>

    <script>
        let timeLeft = 60;
        let activeTeam = null;
        let timer = null;
        let paused = false;
        let extUsed = { 1: false, 2: false };

        function initApp() {
            // Unlocks audio for mobile
            document.getElementById('tick').play().then(() => {
                document.getElementById('tick').pause();
                document.getElementById('overlay').style.display = 'none';
            });
        }

        function startTeam(num) {
            activeTeam = num;
            timeLeft = 60;
            paused = false;
            updateUI();
            clearInterval(timer);
            timer = setInterval(tick, 1000);
        }

        function tick() {
            if (paused) return;
            timeLeft--;
            document.getElementById('display').innerText = timeLeft;
            
            if (timeLeft <= 10 && timeLeft > 0) {
                document.getElementById('display').classList.add('warning');
                document.getElementById('tick').currentTime = 0;
                document.getElementById('tick').play();
            } else {
                document.getElementById('display').classList.remove('warning');
            }

            if (timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('alarm').play();
                document.getElementById('display').innerText = "TIME!";
            }
        }

        function togglePause() {
            paused = !paused;
            document.getElementById('pause-btn').innerText = paused ? "RESUME" : "PAUSE";
            document.getElementById('pause-btn').style.background = paused ? "var(--ddpl-green)" : "#333";
        }

        function useExt(num, e) {
            e.stopPropagation();
            if (activeTeam === num && !extUsed[num]) {
                timeLeft += 30;
                extUsed[num] = true;
                e.target.disabled = true;
                document.getElementById(`t${num}-stat`).innerText = "Extension: USED";
                document.getElementById('display').innerText = timeLeft;
            }
        }

        function updateUI() {
            document.getElementById('team1-btn').className = `team-btn ${activeTeam === 1 ? 'active-team' : ''}`;
            document.getElementById('team2-btn').className = `team-btn ${activeTeam === 2 ? 'active-team' : ''}`;
        }
    </script>
</body>
</html>
